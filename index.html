<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khalid's Piano</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            padding: 30px 20px;
        }

        h1 {
            color: #e0e0e0;
            font-size: 2.45rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .piano {
            position: relative;
            display: flex;
            height: 588px;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5), 0 8px 16px rgba(0, 0, 0, 0.3);
            background: #2a2a2a;
        }

        .key {
            position: relative;
            cursor: pointer;
            border: none;
            outline: none;
            transition: background 0.05s, box-shadow 0.05s;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        .white {
            width: 118px;
            height: 100%;
            background: linear-gradient(180deg, #f8f8f8 0%, #f0f0f0 3%, #e8e8e8 100%);
            border: 2px solid #bbb;
            border-top: none;
            border-radius: 0 0 12px 12px;
            z-index: 1;
        }

        .white:active,
        .white.active {
            background: linear-gradient(180deg, #e0e0e0 0%, #d0d0d0 3%, #c8c8c8 100%);
            box-shadow: inset 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .black {
            width: 76px;
            height: 60%;
            background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
            border: 2px solid #000;
            border-top: none;
            border-radius: 0 0 12px 12px;
            z-index: 2;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .black:active,
        .black.active {
            background: linear-gradient(180deg, #444 0%, #222 100%);
            box-shadow: inset 0 8px 16px #000, 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .label {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 23px;
            font-weight: 700;
            color: #999;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .black .label {
            bottom: 21px;
            color: #888;
            font-size: 21px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            color: #bbb;
            font-size: 1.1rem;
        }

        select {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #7c8;
        }

        input[type="range"] {
            background: #2a2a2a;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            width: 150px;
            accent-color: #7c8;
            padding: 0;
            height: 18px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input {
            accent-color: #7c8;
            width: 20px;
            height: 20px;
        }

        .key-hint {
            position: absolute;
            bottom: 71px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 21px;
            font-weight: bold;
            color: #bbb;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .key:hover .key-hint,
        .key:active .key-hint,
        .key.active .key-hint {
            opacity: 1;
        }

        .black .key-hint {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            bottom: 59px;
        }

        /* Penyesuaian Responsif */
        @media (max-width: 1400px) {
            .piano {
                height: 420px;
            }

            .white {
                width: 88px;
            }

            .black {
                width: 59px;
            }

            .label {
                font-size: 19px;
                bottom: 17px;
            }

            .key-hint {
                bottom: 59px;
                font-size: 19px;
            }

            .black .key-hint {
                bottom: 50px;
            }

            h1 {
                font-size: 2.1rem;
            }
        }

        @media (max-width: 900px) {
            .piano {
                height: 336px;
            }

            .white {
                width: 67px;
            }

            .black {
                width: 46px;
            }

            .label {
                font-size: 15px;
                bottom: 13px;
            }

            .key-hint {
                bottom: 46px;
                font-size: 17px;
                padding: 3px 9px;
            }

            .black .key-hint {
                bottom: 38px;
            }

            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Online Piano</h1>
        <div class="piano" id="piano"></div>
        <div class="controls">
            <div class="control-group">
                <label>Octave</label>
                <select id="octave">
                    <option value="3">C3</option>
                    <option value="4" selected>C4</option>
                    <option value="5">C5</option>
                </select>
            </div>
            <div class="control-group">
                <label>Volume</label>
                <input type="range" id="volume" min="0" max="100" value="70">
            </div>
            <div class="control-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="showHints" checked>
                    Show keys
                </label>
            </div>
            <div class="control-group">
                <label>Suara</label>
                <select id="waveform">
                    <option value="sine">Piano (Sine)</option>
                    <option value="square">Square</option>
                    <option value="sawtooth">Sawtooth</option>
                    <option value="triangle">Triangle</option>
                    <option value="kodok">Kodok 🐸</option>
                    <option value="ayam">Ayam 🐔</option>
                    <option value="bebek">Bebek 🦆</option>
                    <option value="pistol">Pistol 🔫</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Generate Frequencies
        const NOTES = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
        const NOTE_FREQS = {};
        for (let oct = 0; oct <= 8; oct++) {
            for (let n = 0; n < NOTES.length; n++) {
                const name = NOTES[n] + oct;
                const semitones = (oct - 4) * 12 + (n - 9); // A4 = 440Hz
                NOTE_FREQS[name] = 440 * Math.pow(2, semitones / 12);
            }
        }

        const state = {
            octave: 4,
            volume: 0.7,
            showHints: true,
            waveform: 'sine',
            activeKeys: new Map(),
            keyMap: {},
            randomBinds: new Map()
        };

        const pianoEl = document.getElementById('piano');
        const octaveSelect = document.getElementById('octave');
        const volumeSlider = document.getElementById('volume');
        const showHintsCheckbox = document.getElementById('showHints');
        const waveformSelect = document.getElementById('waveform');

        function playNote(noteName) {
            if (!NOTE_FREQS[noteName] || state.activeKeys.has(noteName)) return;
            const freq = NOTE_FREQS[noteName];
            const type = state.waveform;

            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);

            let mainOsc = null;
            let lfoOsc = null;

            if (['sine', 'square', 'sawtooth', 'triangle'].includes(type)) {
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(state.volume, audioCtx.currentTime + 0.02);

                mainOsc = audioCtx.createOscillator();
                mainOsc.type = type;
                mainOsc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                mainOsc.connect(gain);
                mainOsc.start();

            } else if (type === 'pistol') {
                const bufferSize = audioCtx.sampleRate * 1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                mainOsc = audioCtx.createBufferSource();
                mainOsc.buffer = buffer;

                gain.gain.setValueAtTime(state.volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);

                mainOsc.connect(filter);
                filter.connect(gain);
                mainOsc.start();

            } else if (type === 'kodok') {
                mainOsc = audioCtx.createOscillator();
                mainOsc.type = 'sawtooth';
                mainOsc.frequency.setValueAtTime(freq * 0.15, audioCtx.currentTime);

                lfoOsc = audioCtx.createOscillator();
                lfoOsc.type = 'square';
                lfoOsc.frequency.value = 18;

                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 1;

                lfoOsc.connect(lfoGain.gain);
                lfoGain.connect(gain);
                mainOsc.connect(lfoGain);

                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(state.volume, audioCtx.currentTime + 0.05);

                mainOsc.start();
                lfoOsc.start();

            } else if (type === 'ayam') {
                mainOsc = audioCtx.createOscillator();
                mainOsc.type = 'square';
                mainOsc.frequency.setValueAtTime(freq * 1.5, audioCtx.currentTime);
                mainOsc.frequency.exponentialRampToValueAtTime(freq * 0.4, audioCtx.currentTime + 0.15);

                mainOsc.connect(gain);

                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(state.volume, audioCtx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                mainOsc.start();

            } else if (type === 'bebek') {
                mainOsc = audioCtx.createOscillator();
                mainOsc.type = 'sawtooth';
                mainOsc.frequency.setValueAtTime(freq * 0.4, audioCtx.currentTime);

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.Q.value = 3;
                filter.frequency.setValueAtTime(1500, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);

                mainOsc.connect(filter);
                filter.connect(gain);

                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(state.volume, audioCtx.currentTime + 0.02);

                mainOsc.start();
            }

            state.activeKeys.set(noteName, { osc: mainOsc, gain, lfo: lfoOsc });
        }

        function stopNote(noteName) {
            const entry = state.activeKeys.get(noteName);
            if (!entry) return;

            entry.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);

            setTimeout(() => {
                try { entry.osc.stop(); } catch (e) { }
                if (entry.lfo) try { entry.lfo.stop(); } catch (e) { }
            }, 300);

            state.activeKeys.delete(noteName);
        }

        function renderPiano() {
            pianoEl.innerHTML = '';
            state.keyMap = {};
            const oct = state.octave;

            const whiteNotes = [
                { letter: 'C', offset: 0, bind: 'a' },
                { letter: 'D', offset: 0, bind: 's' },
                { letter: 'E', offset: 0, bind: 'd' },
                { letter: 'F', offset: 0, bind: 'f' },
                { letter: 'G', offset: 0, bind: 'g' },
                { letter: 'A', offset: 0, bind: 'h' },
                { letter: 'B', offset: 0, bind: 'j' },
                { letter: 'C', offset: 1, bind: 'k' }
            ];

            const blackNotes = [
                { letter: 'Db', offset: 0, whiteIndex: 1, bind: 'w' },
                { letter: 'Eb', offset: 0, whiteIndex: 2, bind: 'e' },
                { letter: 'Gb', offset: 0, whiteIndex: 4, bind: 't' },
                { letter: 'Ab', offset: 0, whiteIndex: 5, bind: 'y' },
                { letter: 'Bb', offset: 0, whiteIndex: 6, bind: 'u' }
            ];

            const createKeyElement = (noteName, keyBind, type) => {
                const key = document.createElement('button');
                key.className = `key ${type}`;
                key.dataset.note = noteName;

                const label = document.createElement('span');
                label.className = 'label';
                label.textContent = noteName;
                key.appendChild(label);

                const hint = document.createElement('span');
                hint.className = 'key-hint';
                hint.textContent = keyBind.toUpperCase();
                hint.style.display = state.showHints ? '' : 'none';
                key.appendChild(hint);

                const start = (e) => {
                    e.preventDefault();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    playNote(noteName);
                    key.classList.add('active');
                };
                const stop = (e) => {
                    e.preventDefault();
                    stopNote(noteName);
                    key.classList.remove('active');
                };

                key.addEventListener('pointerdown', start);
                key.addEventListener('pointerup', stop);
                key.addEventListener('pointerleave', stop);

                return key;
            };

            whiteNotes.forEach((data) => {
                const noteName = data.letter + (oct + data.offset);
                state.keyMap[data.bind] = noteName;
                const keyEl = createKeyElement(noteName, data.bind, 'white');
                pianoEl.appendChild(keyEl);
            });

            // Skala ukuran lebar JS disesuaikan 70% dari yang 3x lipat
            const whiteW = window.innerWidth <= 900 ? 67 : window.innerWidth <= 1400 ? 88 : 118;
            const blackW = window.innerWidth <= 900 ? 46 : window.innerWidth <= 1400 ? 59 : 76;

            blackNotes.forEach((data) => {
                const noteName = data.letter + (oct + data.offset);
                state.keyMap[data.bind] = noteName;

                const keyEl = createKeyElement(noteName, data.bind, 'black');
                keyEl.style.position = 'absolute';
                keyEl.style.left = `${(data.whiteIndex * whiteW) - (blackW / 2)}px`;
                keyEl.style.top = '0';

                pianoEl.appendChild(keyEl);
            });
        }

        function handleKeyDown(e) {
            if (e.repeat) return;
            let noteName = state.keyMap[e.key.toLowerCase()];

            if (!noteName) {
                const availableNotes = Object.values(state.keyMap);
                noteName = availableNotes[Math.floor(Math.random() * availableNotes.length)];
                state.randomBinds.set(e.code, noteName);
            }

            if (audioCtx.state === 'suspended') audioCtx.resume();
            playNote(noteName);

            const el = pianoEl.querySelector(`[data-note="${noteName}"]`);
            if (el) el.classList.add('active');
        }

        function handleKeyUp(e) {
            let noteName = state.keyMap[e.key.toLowerCase()];

            if (!noteName) {
                noteName = state.randomBinds.get(e.code);
                state.randomBinds.delete(e.code);
            }

            if (!noteName) return;

            stopNote(noteName);
            const el = pianoEl.querySelector(`[data-note="${noteName}"]`);
            if (el) el.classList.remove('active');
        }

        octaveSelect.addEventListener('change', () => { state.octave = parseInt(octaveSelect.value); renderPiano(); });
        volumeSlider.addEventListener('input', () => { state.volume = parseFloat(volumeSlider.value) / 100; });
        showHintsCheckbox.addEventListener('change', () => {
            state.showHints = showHintsCheckbox.checked;
            pianoEl.querySelectorAll('.key-hint').forEach(h => h.style.display = state.showHints ? '' : 'none');
        });
        waveformSelect.addEventListener('change', () => { state.waveform = waveformSelect.value; });

        window.addEventListener('resize', renderPiano);
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);

        renderPiano();
    </script>

</body>

</html>
